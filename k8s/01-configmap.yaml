apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-config
  namespace: web-prod
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  DB_HOST: "db.example.internal"
  DB_PORT: "5432"
  DB_NAME: "webapp"
  LOG_LEVEL: "INFO"
  JAVA_OPTS: >-
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=75.0
    -Djava.security.egd=file:/dev/./urandom
