apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: web-prod
  labels:
    app: web-app
    version: v1.0.0
    team: platform
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2

  selector:
    matchLabels:
      app: web-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  revisionHistoryLimit: 5

  template:
    metadata:
      labels:
        app: web-app
        version: v1.0.0
      annotations:
        checksum/config: "placeholder-update-when-configmap-changes"

    spec:
      serviceAccountName: web-app-sa
      automountServiceAccountToken: false

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: web-app

      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 60

      containers:
        - name: web-app
          image: myregistry.io/web-app:v1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
               name: web-app-config

          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: web-app-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: web-app-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: web-app-secrets
                  key: JWT_SECRET

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs

          startupProbe:
            httpGet:
              path: /hello
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /hello
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /hello
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "100Mi"
        - name: app-logs
          emptyDir:
            sizeLimit: "500Mi"
